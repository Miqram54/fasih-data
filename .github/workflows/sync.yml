name: Kontinu Sync Fasih BPS 24 Jam

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Jalankan Sinkronisasi Data Wilayah
      run: python sync_bps_fasih.py

    - name: Commit dan Push Perubahan ke Repositori
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        git add data_output/struktur_wilayah_sulsel.json
        
        if git diff --cached --quiet; then
          echo "Tidak ada penambahan data wilayah baru."
        else
          git commit -m "Update otomatis pohon data wilayah Sulawesi Selatan (Kecamatan/Kelurahan/SLS)"
          git push
        fi
