name: Kontinu Sync Fasih BPS 24 Jam

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests urllib3

    - name: Jalankan Sinkronisasi Data Wilayah
      id: sync
      run: python sync_bps_fasih.py
      continue-on-error: true

    - name: Check if Data File Exists
      id: check_file
      run: |
        if [ -f "data_output/struktur_wilayah_sulsel.json" ]; then
          echo "file_exists=true" >> $GITHUB_OUTPUT
          echo "✅ File ditemukan, siap untuk di-commit"
        else
          echo "file_exists=false" >> $GITHUB_OUTPUT
          echo "❌ File tidak ditemukan, data fetch mungkin gagal"
        fi

    - name: Commit dan Push Perubahan ke Repositori
      if: steps.check_file.outputs.file_exists == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add data_output/struktur_wilayah_sulsel.json
        
        if git diff --staged --quiet; then
          echo "ℹ️  Tidak ada penambahan data wilayah baru."
        else
          git commit -m "Update otomatis pohon data wilayah Sulawesi Selatan (Kecamatan/Kelurahan/SLS)"
          git push
          echo "✅ Perubahan berhasil di-push ke repositori"
        fi

    - name: Report Job Status
      if: always()
      run: |
        echo "📊 Status Laporan:"
        echo "- Sync Script: ${{ steps.sync.outcome }}"
        echo "- File Exists: ${{ steps.check_file.outputs.file_exists }}"
        
        if [ "${{ steps.check_file.outputs.file_exists }}" != "true" ]; then
          echo "❌ Workflow gagal: Data tidak berhasil diambil"
          exit 1
        fi
