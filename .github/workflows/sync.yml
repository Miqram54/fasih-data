name: Kontinu Sync Fasih BPS 24 Jam

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        persist-credentials: true  # Memaksa token bawaan tetap aktif selama proses push

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Jalankan Sinkronisasi Data Wilayah
      run: python sync_bps_fasih.py

    - name: Commit dan Push Perubahan ke Repositori
      run: |
        # Mengatur identitas lokal robot secara mutlak sebelum commit
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        # Amankan target file output
        git add data_output/struktur_wilayah_sulsel.json
        
        if git diff --staged --quiet; then
          echo "Tidak ada penambahan data wilayah baru."
        else
          git commit -m "Update otomatis pohon data wilayah Sulawesi Selatan (Kecamatan/Kelurahan/SLS)"
          git push origin main
        fi
